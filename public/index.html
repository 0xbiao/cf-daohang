<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{SITE_NAME}} - 网址导航</title>
  <link rel="icon" href="/favicon.svg?v=148aafdf" type="image/svg+xml">
  <link rel="stylesheet" href="/css/style.css?v=41626485">
  <script>
    // Init Theme ASAP to prevent FOUC
    if (localStorage.getItem('theme') === 'dark') {
      document.documentElement.classList.add('dark');
    }
  </script>
  <link rel="stylesheet" href="/css/tailwind.min.css?v=433b4379">
</head>

<body class="bg-secondary-50 font-sans text-gray-800">
  <input type="checkbox" id="sidebar-toggle" class="hidden">

  <!-- 左上角操作区 (移动端导航按钮 或 GitHub 图标) -->
  {{LEFT_TOP_ACTION}}

  <!-- 右上角操作区 (主题切换, 后台入口) -->
  {{RIGHT_TOP_ACTION}}

  <div id="mobileOverlay" class="fixed inset-0 bg-black bg-opacity-50 z-40 mobile-overlay lg:hidden"></div>

  <!-- 桌面侧边栏开关按钮 -->
  <div class="fixed top-4 left-4 z-50 hidden lg:block {{SIDEBAR_TOGGLE_CLASS}}">
    <label for="sidebar-toggle" class="p-2 rounded-lg bg-white shadow-md hover:bg-gray-100 inline-block cursor-pointer">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-primary-500" fill="none" viewBox="0 0 24 24"
        stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
      </svg>
    </label>
  </div>

  <!-- 侧边栏 -->
  <aside id="sidebar"
    class="sidebar fixed left-0 top-0 h-full w-64 bg-white dark:bg-gray-900 shadow-md border-r border-primary-100/60 dark:border-gray-800 z-50 overflow-y-auto mobile-sidebar lg:transform-none transition-all duration-300 {{SIDEBAR_CLASS}}">
    <div class="p-6">
      <div class="flex items-center justify-end mb-8">
        <button id="closeSidebar" class="p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 lg:hidden">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500 dark:text-gray-400" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
        <label for="sidebar-toggle"
          class="p-1 rounded-full hover:bg-gray-100 dark:hover:bg-gray-700 hidden lg:block cursor-pointer">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-gray-500 dark:text-gray-400" fill="none"
            viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </label>
      </div>

      <!-- 移动端本地搜索框 -->
      <div class="relative block sm:hidden mb-6 group">
        <input type="text" placeholder="查找书签..."
          class="search-input-target w-full pl-9 pr-3 py-2.5 rounded-xl text-sm transition-all bg-gray-50/50 dark:bg-gray-800/50 border border-gray-200 dark:border-gray-700 outline-none focus:ring-2 focus:ring-primary-500/50 shadow-sm text-gray-700 dark:text-gray-200"
          autocomplete="off">
        <svg xmlns="http://www.w3.org/2000/svg"
          class="h-4 w-4 absolute left-3 top-3.5 text-gray-400 group-focus-within:text-primary-500 transition-colors"
          fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
            d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>

      <div>
        <h3 class="text-sm font-medium text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-3">分类导航</h3>
        <div class="space-y-1">
          {{CATALOG_LINKS}}
        </div>
      </div>

      <div class="mt-8 pt-6 border-t border-gray-200 dark:border-gray-800">
        <div class="{{SUBMISSION_CLASS}}">
          <button id="addSiteBtnSidebar"
            class="w-full flex items-center justify-center px-4 py-2 bg-accent-500 text-white rounded-lg hover:bg-accent-600 transition duration-300 mb-4">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            添加新书签
          </button>
        </div>


        <a href="/admin" target="_blank"
          class="mt-2 flex items-center px-4 py-2 text-gray-600 dark:text-gray-400 hover:text-primary-500 dark:hover:text-primary-400 transition duration-300">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24"
            stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
          </svg>
          后台管理
        </a>
      </div>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content {{MAIN_CLASS}} min-h-screen transition-all duration-300">
    <header class="{{HEADER_CLASS}} text-white py-10 px-6 md:px-10 shadow-sm">
      {{HEADER_CONTENT}}
    </header>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 {{STATS_ROW_PY_CLASS}}">
      <div class="flex items-center justify-between {{STATS_ROW_MB_CLASS}} {{STATS_ROW_HIDDEN}} gap-4">
        <h2 class="text-xl font-semibold text-gray-800 {{STATS_VISIBLE}} whitespace-nowrap" {{STATS_STYLE}}
          data-role="list-heading" data-default="{{HEADING_DEFAULT}}" data-active="{{HEADING_ACTIVE}}">
          {{HEADING_TEXT}}
        </h2>

        <!-- 桌面端本地搜索框 -->
        <div class="hidden sm:flex items-center relative w-full max-w-xs group">
          <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 absolute left-3 text-gray-400 pointer-events-none"
            style="top: 50%; transform: translateY(-50%);" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
          </svg>
          <input type="text" placeholder="过滤书签..."
            class="search-input-target w-full pl-9 pr-10 py-2 rounded-xl text-sm transition-all focus:ring-2 focus:ring-primary-500/50 shadow-sm border border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800 outline-none text-gray-700 dark:text-gray-200 focus:border-primary-400"
            autocomplete="off">
          <button type="button" class="absolute right-1 p-1.5 text-gray-400 hover:text-primary-500 transition-colors"
            style="top: 50%; transform: translateY(-50%);">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
              stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </button>
        </div>
      </div>
    </div>

    <section class="max-w-7xl mx-auto px-4 sm:px-6 pb-12">
      <div class="{{CONTAINER_CLASS}} p-4 sm:p-6">
        <div id="sitesGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 sm:gap-6">
          {{SITES_GRID}}
        </div>
      </div>
    </section>

    <footer class="{{FOOTER_CLASS}}">
      <div class="max-w-5xl mx-auto text-center">
        <p>© {{CURRENT_YEAR}} {{FOOTER_TEXT}}</p>
      </div>
    </footer>

  </main>

  <button id="backToTop"
    class="fixed bottom-8 right-8 p-3 rounded-full bg-accent-500 text-white shadow-lg opacity-0 invisible transition-all duration-300 hover:bg-accent-600">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 11l7-7 7 7M5 19l7-7 7 7" />
    </svg>
  </button>

  <!-- 添加网站模态框 -->
  <div id="addSiteModal"
    class="fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50 opacity-0 invisible transition-all duration-300">
    <div
      class="bg-white rounded-xl shadow-2xl w-full max-w-md mx-4 transform translate-y-8 transition-all duration-300">
      <div class="p-6">
        <div class="flex items-center justify-between mb-4">
          <h2 class="text-xl font-semibold text-gray-900">添加新书签</h2>
          <button id="closeModal" class="text-gray-400 hover:text-gray-500">
            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>

        <form id="addSiteForm" class="space-y-4">
          <div>
            <label for="addSiteName" class="block text-sm font-medium text-gray-700">名称</label>
            <input type="text" id="addSiteName" required
              class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
          </div>

          <div>
            <label for="addSiteUrl" class="block text-sm font-medium text-gray-700">网址</label>
            <input type="text" id="addSiteUrl" required
              class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
          </div>

          <div>
            <label for="addSiteLogo" class="block text-sm font-medium text-gray-700">Logo (可选)</label>
            <input type="text" id="addSiteLogo"
              class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400">
          </div>

          <div>
            <label for="addSiteDesc" class="block text-sm font-medium text-gray-700">描述 (可选)</label>
            <textarea id="addSiteDesc" rows="2"
              class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400"></textarea>
          </div>

          <div>
            <label for="addSiteCatelog" class="block text-sm font-medium text-gray-700">分类</label>
            <select id="addSiteCatelog" required
              class="mt-1 block w-full px-3 py-2 border border-primary-100 rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-400 bg-white">
              <option value="" disabled selected>加载中...</option>
            </select>
          </div>

          <div class="flex justify-end pt-4">
            <button type="button" id="cancelAddSite"
              class="bg-white py-2 px-4 border border-primary-100 rounded-md shadow-sm text-sm font-medium text-primary-600 hover:bg-secondary-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary-200 mr-3">
              取消
            </button>
            <button type="submit"
              class="inline-flex justify-center py-2 px-4 border border-transparent shadow-sm text-sm font-medium rounded-md text-white bg-accent-500 hover:bg-accent-600 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-accent-400">
              提交
            </button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <script src="/js/main.js?v=41d28615"></script>
</body>

</html>
